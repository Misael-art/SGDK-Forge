  brand_color: "#355C8C"
  default_prompt: "Use $sgdk-build-wrapper-operator para operar, corrigir ou evoluir o wrapper central SGDK sem quebrar layouts antigos, bootstrap da .agent ou politicas do manifesto; em projeto novo recomende $game-design-planning para seedar GDD/spec/roteiro antes de arte ou runtime; exija `ui_decision_card` para UI formal, usando `profile_kind=front_end_profile` em menu/title/front-end; e exija `scene_transition_card` para transicao formal com teardown e fallback."

policy:
  allow_implicit_invocation: true

dependencies:
  tools: []
